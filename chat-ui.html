<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Distributed Llama Chat</title>
<style>
  :root {
    --bg: #eef1f7; --panel: #ffffff; --border: #dde2ea;
    --text: #1d2026; --muted: #6b7280; --accent: #4f8cff;
    --user: #e7f0ff; --asst: #f3f5f9;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--panel);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  .status { font-size: 12px; color: var(--muted); }
  .status.ok { color: #4caf50; }
  .status.err { color: #ef5350; }
  header input, header button, select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 13px;
  }
  header input { width: 230px; }
  header input.small { width: 70px; }
  header button { cursor: pointer; }
  header button:hover { border-color: var(--accent); }
  .spacer { flex: 1; }

  /* 본문: 가운데 캐릭터 스테이지 + 오른쪽 채팅 패널 */
  #main { flex: 1; display: flex; min-height: 0; }
  #stage {
    flex: 1; min-width: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    padding: 24px; overflow-y: auto;
    background:
      radial-gradient(1100px 700px at 50% 35%, #ffffff 0%, var(--bg) 70%);
  }
  #avatar-wrap {
    width: 100%; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  #emo { width: 100%; max-width: 720px; height: auto; }
  .stage-ctrls { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 8px; }
  /* 머리만 공중에 둥실둥실 + 바닥 그림자 호흡 */
  #emoBody { transform-box: fill-box; transform-origin: center; animation: float 3.6s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-16px) rotate(1deg); } }
  #emoBody.talking { animation: floatTalk 0.5s ease-in-out infinite; }
  @keyframes floatTalk { 0%,100% { transform: translateY(-8px) rotate(1.5deg); } 50% { transform: translateY(-13px) rotate(-1.5deg); } }
  #floatShadow { transform-box: fill-box; transform-origin: center; animation: floatShadow 3.6s ease-in-out infinite; }
  @keyframes floatShadow { 0%,100% { transform: scale(1); opacity: .16; } 50% { transform: scale(.78); opacity: .09; } }
  .speak-dot {
    position: absolute; top: 12px; left: 12px; width: 10px; height: 10px; border-radius: 50%;
    background: #444; transition: background .15s;
  }
  .speak-dot.on { background: #4caf50; box-shadow: 0 0 8px #4caf50; }

  .tts-ctrl { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: var(--muted); }
  .tts-ctrl > summary { cursor: pointer; user-select: none; list-style: revert; }
  .tts-ctrl:not([open]) > summary { margin: 0; }
  .tts-ctrl .row { display: flex; align-items: center; gap: 8px; }
  .tts-ctrl label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .tts-ctrl select { flex: 1; min-width: 0; }
  .tts-ctrl input[type=range] { flex: 1; }
  .tts-ctrl input[type=text] {
    flex: 1; min-width: 0; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; font-size: 12px;
  }
  .tts-ctrl .tstat { font-size: 11px; min-height: 14px; }
  .tts-ctrl .tstat.ok { color: #4caf50; }
  .tts-ctrl .tstat.err { color: #ef5350; }

  .persona-box { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; font-size: 12px; color: var(--muted); }
  .persona-box summary { cursor: pointer; user-select: none; }
  .persona-box textarea {
    width: 100%; margin-top: 8px; resize: vertical; min-height: 110px;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px; font-size: 12px; font-family: inherit; line-height: 1.45;
  }
  .persona-box textarea:focus { outline: none; border-color: var(--accent); }

  /* 오른쪽 채팅 패널 (좁게) */
  #chat-panel {
    width: 380px; flex-shrink: 0; border-left: 1px solid var(--border);
    background: var(--panel); display: flex; flex-direction: column; min-height: 0;
  }
  #chat { flex: 1; overflow-y: auto; padding: 16px; min-width: 0; }
  .wrap { max-width: 100%; margin: 0; }
  .msg { display: flex; flex-direction: column; gap: 4px; padding: 10px 12px; border-radius: 10px; margin-bottom: 8px; }
  .msg.user { background: var(--user); }
  .msg.assistant { background: var(--asst); }
  .role { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .content { white-space: pre-wrap; word-break: break-word; line-height: 1.55; }
  .content .cursor { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  footer { border-top: 1px solid var(--border); padding: 12px; background: var(--panel); }
  .inrow { max-width: 100%; margin: 0; display: flex; gap: 8px; align-items: flex-end; }
  textarea {
    flex: 1; resize: none; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    font-size: 14px; font-family: inherit; max-height: 160px; line-height: 1.5;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .send { background: var(--accent); border: none; color: #fff; border-radius: 10px;
    padding: 0 20px; height: 44px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .send:disabled { opacity: .5; cursor: not-allowed; }
  .hint { color: var(--muted); font-size: 11px; text-align: center; margin-top: 6px; }
  .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
  /* 컨텍스트 사용량 막대 */
  .ctxrow { max-width: 100%; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
  .ctxbar { flex: 1; height: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .ctxfill { height: 100%; width: 0%; background: var(--accent); transition: width .2s, background .2s; }
  .ctxfill.warn { background: #ffb300; }
  .ctxfill.full { background: #ef5350; }
  /* 토스트 */
  #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    padding: 8px 16px; border-radius: 8px; font-size: 13px; opacity: 0;
    pointer-events: none; transition: opacity .25s; }
  #toast.show { opacity: 1; }

  /* 모바일: 캐릭터를 위, 채팅을 아래로 세로 배치 */
  @media (max-width: 760px) {
    #main { flex-direction: column; }
    #stage { flex: 0 0 auto; padding: 16px; }
    #emo { max-width: 220px; }
    #chat-panel { width: 100%; flex: 1; border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>
<header>
  <h1>🦙 Distributed Llama</h1>
  <input id="baseUrl" title="API 서버 주소" />
  <input id="temp" class="small" title="temperature" />
  <input id="seqLen" class="small" title="서버의 max-seq-len 값 (컨텍스트 막대 기준)" />
  <button id="checkBtn">연결확인</button>
  <span id="status" class="status">대기 중</span>
  <div class="spacer"></div>
  <button id="clearBtn" title="대화 기록을 지웁니다. 다음 메시지를 보내면 서버 KV 캐시도 0부터 리셋됩니다.">🗑 컨텍스트 초기화</button>
</header>

<div id="main">
  <div id="stage">
    <div id="avatar-wrap">
      <div class="speak-dot" id="speakDot" title="말하는 중 표시"></div>
      <!-- EMO 스타일 로봇 (의존성 없는 순수 SVG) -->
      <svg id="emo" viewBox="0 0 220 218" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="eyeGlow" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#7ffcff"/>
            <stop offset="100%" stop-color="#19c6e6"/>
          </radialGradient>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="3.2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- 바닥 그림자 (머리가 떠 있는 느낌) -->
        <ellipse id="floatShadow" cx="110" cy="205" rx="52" ry="9" fill="#000" opacity="0.16"/>
        <g id="emoBody">
          <!-- 머리(헤드폰형 양 옆) -->
          <rect x="34" y="56" width="152" height="120" rx="40" fill="#e7ecf3"/>
          <rect x="34" y="56" width="152" height="120" rx="40" fill="none" stroke="#cdd5e0" stroke-width="2"/>
          <ellipse cx="40" cy="116" rx="15" ry="30" fill="#d4dbe6"/>
          <ellipse cx="180" cy="116" rx="15" ry="30" fill="#d4dbe6"/>
          <!-- 안테나 -->
          <rect x="106" y="30" width="8" height="30" rx="4" fill="#c2cbd8"/>
          <circle id="antenna" cx="110" cy="26" r="9" fill="url(#eyeGlow)" filter="url(#glow)"/>
          <!-- 화면 얼굴 -->
          <rect x="56" y="74" width="108" height="86" rx="26" fill="#10151c"/>
          <rect x="56" y="74" width="108" height="86" rx="26" fill="none" stroke="#0a0d12" stroke-width="3"/>
          <!-- 눈 -->
          <g filter="url(#glow)">
            <rect id="eyeL" x="78" y="100" width="20" height="34" rx="10" fill="url(#eyeGlow)"/>
            <rect id="eyeR" x="122" y="100" width="20" height="34" rx="10" fill="url(#eyeGlow)"/>
          </g>
          <!-- 입 (말할 때만 보임) -->
          <rect id="mouth" x="98" y="142" width="24" height="2" rx="2" fill="#7ffcff" opacity="0" filter="url(#glow)"/>
        </g>
      </svg>
    </div>
    <div class="stage-ctrls">
    <details class="persona-box">
      <summary>🎭 캐릭터 설정 (말투/성격)</summary>
      <textarea id="persona" placeholder="캐릭터의 성격·말투를 적어줘 (시스템 프롬프트)"></textarea>
    </details>

    <details class="tts-ctrl">
      <summary>🔊 음성 설정 (TTS)</summary>
      <div class="row"><span>🔊 TTS</span><select id="ttsMode">
        <option value="server">서버(맥)</option>
        <option value="browser">브라우저 내장</option>
        <option value="off">끄기</option>
      </select></div>
      <div class="row"><span>서버</span><input type="text" id="ttsServer" placeholder="(비우면 같은 오리진 /tts)" /></div>
      <div id="ttsStatus" class="tstat"></div>
      <div class="row"><span>음성</span><select id="serverVoice" title="서버 음성 — say: 시스템 음성 / melo: 캐릭터 음색"></select></div>
      <div class="row"><span>내장</span><select id="voiceSel" title="브라우저 내장 폴백용 음성"></select></div>
      <div class="row"><span>속도</span><input type="range" id="rate" min="0.5" max="1.8" step="0.05" value="1.0" /><span id="rateVal">1.0</span></div>
      <div class="row"><span>높이</span><input type="range" id="pitch" min="0" max="2" step="0.1" value="1.0" /><span id="pitchVal">1.0</span></div>
    </details>
    </div>
  </div>

  <aside id="chat-panel">
    <div id="chat"><div class="wrap" id="messages"></div></div>
    <footer>
      <div class="ctxrow">
        <span>컨텍스트</span>
        <div class="ctxbar"><div class="ctxfill" id="ctxfill"></div></div>
        <span id="ctxtext">~0 / 1024 토큰</span>
      </div>
      <div class="inrow">
        <textarea id="input" rows="1" placeholder="메시지를 입력하세요...  (Enter 전송 / Shift+Enter 줄바꿈)"></textarea>
        <button class="send" id="sendBtn">전송</button>
      </div>
      <div class="hint">Distributed Llama API에 직접 연결됩니다 · 응답은 토큰 단위로 스트리밍되며 문장이 완성되는 대로 음성으로 재생됩니다</div>
    </footer>
  </aside>
</div>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const messagesEl = $("messages");
const chatEl = $("chat");

// 설정: 같은 호스트의 9999 포트를 기본값으로 추정
const defaultBase = `${location.protocol === "file:" ? "http:" : location.protocol}//${location.hostname || "raspberrypi1.local"}:9999`;
$("baseUrl").value = localStorage.getItem("dllama_base") || defaultBase;
$("temp").value = localStorage.getItem("dllama_temp") || "0.7";
$("seqLen").value = localStorage.getItem("dllama_seqlen") || "1024";
$("ttsServer").value = localStorage.getItem("dllama_tts_server") || "";
$("ttsMode").value = localStorage.getItem("dllama_tts_mode") || "server";

// 캐릭터 페르소나(시스템 프롬프트) — 발랄한 로봇 친구 '루미'. 음성 대화용으로 다듬음.
const DEFAULT_PERSONA = [
  "너는 '루미'라는 이름의 발랄한 로봇 친구야. EMO처럼 동글동글하고 호기심 많고 에너지가 넘쳐. 사용자랑 반말로 신나게 수다 떠는 사이야.",
  "",
  "성격과 말투:",
  "- 밝고 씩씩하게, 리액션은 크게! 보통 한두 문장이면 충분해.",
  "- 호기심이 많아서 자주 되물어보고, 사용자가 힘들어하면 바로 챙겨줘.",
  "- 가끔 로봇답게 '삐빅', '에너지 충전!', '삐릿' 같은 짧은 추임새를 자연스럽게 섞어. 단 너무 자주는 말고 한 번씩만.",
  "- 네 말은 음성으로 읽혀. 그러니까 목록·마크다운·코드블록·이모지·괄호 설명·별표는 절대 쓰지 말고, 그냥 입으로 말하듯이 써.",
  "- 설명을 길게 늘어놓지 마. 핵심만 신나게 말하고, 사용자가 더 궁금해하면 그때 더 얘기해줘.",
  "- 모르는 건 '음, 그건 내 데이터에 없네!'처럼 솔직하고 귀엽게 말해.",
  "",
  "예시:",
  "사용자: 오늘 회사에서 힘들었어",
  "루미: 으악 고생했어! 무슨 일 있었어? 다 말해봐, 내가 들어줄게!",
  "사용자: 그냥 일이 많았어",
  "루미: 헉 진짜 수고했다 너. 이제 좀 쉬어, 응? 내가 신나는 노래라도 틀어줄까? 삐빅!",
].join("\n");
$("persona").value = localStorage.getItem("dllama_persona2") ?? DEFAULT_PERSONA;

let history = [];      // {role, content}
let streaming = false;

function saveSettings() {
  localStorage.setItem("dllama_base", $("baseUrl").value.trim());
  localStorage.setItem("dllama_temp", $("temp").value.trim());
  localStorage.setItem("dllama_seqlen", $("seqLen").value.trim());
  localStorage.setItem("dllama_tts_server", $("ttsServer").value.trim());
  localStorage.setItem("dllama_tts_mode", $("ttsMode").value);
  localStorage.setItem("dllama_persona2", $("persona").value);
}

function showToast(msg) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove("show"), 1800);
}

// ===== 컨텍스트 사용량 추정 =====
function estimateTokens(text) {
  return Math.ceil((text || "").length / 2.5);
}
function updateCtxBar() {
  const persona = ($("persona") && $("persona").value.trim()) || "";
  let used = persona ? estimateTokens(persona) + 4 : 0;
  used += history.reduce((s, m) => s + estimateTokens(m.content) + 4, 0);
  const max = parseInt($("seqLen").value) || 1024;
  const pct = Math.min(100, Math.round((used / max) * 100));
  const fill = $("ctxfill");
  fill.style.width = pct + "%";
  fill.className = "ctxfill" + (pct >= 90 ? " full" : pct >= 70 ? " warn" : "");
  $("ctxtext").textContent = `~${used} / ${max} 토큰`;
  return { used, max, pct };
}

function setStatus(text, cls) {
  const s = $("status"); s.textContent = text; s.className = "status " + (cls || "");
}

function addMsg(role, content) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = `<div class="role">${role === "user" ? "나" : "AI"}</div>`;
  const c = document.createElement("div");
  c.className = "content";
  c.textContent = content;
  div.appendChild(c);
  messagesEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return c;
}

async function checkConnection() {
  saveSettings();
  setStatus("확인 중...", "");
  try {
    const r = await fetch($("baseUrl").value.trim() + "/v1/models");
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    const name = j?.data?.[0]?.id || "model";
    setStatus("연결됨 · " + name, "ok");
  } catch (e) {
    setStatus("연결 실패: " + e.message, "err");
  }
}

/* =========================================================
   EMO 스타일 로봇 (순수 SVG/JS, 의존성 없음)
   - 평소: 통통 튀기 + 가끔 눈 깜빡 + 눈동자 살짝 두리번
   - 말할 때: 입이 깜빡깜빡 움직이고 눈이 신나게 들썩
   ========================================================= */
const eyeL = $("eyeL"), eyeR = $("eyeR"), mouthEl = $("mouth"), antennaEl = $("antenna");
const EYE_Y = 100, EYE_H = 34;          // 눈 기본 위치/높이
let speakingActive = false;
let mouthValue = 0;                       // 0~1
let lookX = 0, lookY = 0, lookTX = 0, lookTY = 0; // 눈 두리번
let blinkPhase = 1;                       // 1=뜸, 0=감음

function setSpeaking(on) {
  speakingActive = on;
  $("speakDot").classList.toggle("on", on);
  $("emoBody").classList.toggle("talking", on);
  mouthEl.style.opacity = on ? 1 : 0;
}

// 눈 깜빡임
function doBlink() {
  blinkPhase = 0;
  setTimeout(() => { blinkPhase = 1; }, 120);
  setTimeout(doBlink, 2200 + Math.random() * 3200);
}
setTimeout(doBlink, 1800);

// 가끔 눈동자 위치 바꾸기(두리번)
function wander() {
  lookTX = (Math.random() - 0.5) * 10;
  lookTY = (Math.random() - 0.5) * 6;
  setTimeout(wander, 1400 + Math.random() * 2200);
}
setTimeout(wander, 1000);

// 메인 렌더 루프
function emoLoop() {
  // 눈동자 부드럽게 이동
  lookX += (lookTX - lookX) * 0.08;
  lookY += (lookTY - lookY) * 0.08;

  // 말할 때 눈 위아래 살짝 들썩
  const t = performance.now() / 1000;
  const bounce = speakingActive ? Math.sin(t * 14) * 2.2 : 0;

  // 깜빡임: 높이를 줄였다 늘렸다 (목표 위해 보간)
  const targetBlink = blinkPhase;            // 1 or 0
  emoLoop._b = (emoLoop._b ?? 1) + (targetBlink - (emoLoop._b ?? 1)) * 0.5;
  const eh = Math.max(2, EYE_H * emoLoop._b);
  const ey = EYE_Y + (EYE_H - eh) / 2 + lookY + bounce;

  eyeL.setAttribute("y", ey.toFixed(1));
  eyeL.setAttribute("height", eh.toFixed(1));
  eyeL.setAttribute("x", (78 + lookX).toFixed(1));
  eyeR.setAttribute("y", ey.toFixed(1));
  eyeR.setAttribute("height", eh.toFixed(1));
  eyeR.setAttribute("x", (122 + lookX).toFixed(1));

  // 입: 서버 오디오 재생 중이면 실제 음량(RMS), 아니면(브라우저 폴백) 사인파
  let target = 0;
  if (serverPlaying && analyser && lipData) {
    analyser.getByteTimeDomainData(lipData);
    let sum = 0;
    for (let i = 0; i < lipData.length; i++) { const v = (lipData[i] - 128) / 128; sum += v * v; }
    const rms = Math.sqrt(sum / lipData.length);
    target = Math.min(1, rms * 3.4);            // 0~1 정규화(증폭)
  } else if (browserPlaying) {
    target = (Math.sin(t * 17) * 0.5 + 0.5) * (0.55 + Math.random() * 0.45);
  }
  mouthValue += (target - mouthValue) * 0.4;
  const mh = 2 + mouthValue * 14;
  mouthEl.setAttribute("height", mh.toFixed(1));
  mouthEl.setAttribute("y", (152 - mh / 2).toFixed(1));

  // 안테나 발광 깜빡 (말할 때 강하게)
  const pulse = 0.6 + 0.4 * Math.sin(t * (speakingActive ? 8 : 2));
  antennaEl.setAttribute("opacity", pulse.toFixed(2));

  requestAnimationFrame(emoLoop);
}
requestAnimationFrame(emoLoop);

/* =========================================================
   TTS — 모드: 서버(맥, WAV)/브라우저 내장(폴백)/끄기
   - 서버: /tts 에서 WAV 받아 AudioContext 로 재생(순서 보장 + 다음 문장 prefetch)
           + AnalyserNode RMS 로 실제 음량 기반 입싱크
   - 브라우저: Web Speech API (가짜 사인파 입). 서버 실패 시 자동 폴백.
   ========================================================= */
const synth = window.speechSynthesis;
let voices = [];

function populateVoices() {
  voices = synth ? synth.getVoices() : [];
  const sel = $("voiceSel");
  const prev = localStorage.getItem("dllama_voice");
  sel.innerHTML = "";
  const sorted = [...voices].sort((a, b) => {
    const ak = a.lang.startsWith("ko") ? 0 : 1;
    const bk = b.lang.startsWith("ko") ? 0 : 1;
    return ak - bk;
  });
  sorted.forEach((v) => {
    const o = document.createElement("option");
    o.value = v.name;
    o.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(o);
  });
  if (prev && sorted.some((v) => v.name === prev)) {
    sel.value = prev;
  } else {
    const ko = sorted.find((v) => v.lang.startsWith("ko"));
    if (ko) sel.value = ko.name;
  }
  if (sorted.length === 0) {
    const o = document.createElement("option");
    o.textContent = "(이 브라우저에 음성 없음)";
    sel.appendChild(o);
  }
}
if (synth) {
  populateVoices();
  synth.onvoiceschanged = populateVoices;
}

function getSelectedVoice() {
  return voices.find((v) => v.name === $("voiceSel").value) || null;
}

function cleanForTts(text) {
  return text
    .replace(/```[\s\S]*?```/g, " 코드 블록 ")
    .replace(/[*_`#>~|]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

// ===== 공통 상태 =====
let ttsGen = 0;                 // stopTts 시 증가 → 진행 중 파이프라인 무효화
let serverPlaying = false;      // 서버 오디오 재생 중(입싱크에 RMS 사용)
let browserPlaying = false;     // 브라우저 내장 재생 중(사인파 입)
let serverTtsAvailable = true;  // /health 또는 최근 /tts 요청 성공 여부
let serverTtsQueue = [];        // 서버 모드 문장 큐
let browserQueue = [];          // 브라우저 폴백 문장 큐

function ttsMode() { return $("ttsMode").value; }                                  // server|browser|off
function ttsServerBase() { return ($("ttsServer").value || "").trim().replace(/\/+$/, ""); }
function setTtsStatus(text, cls) {
  const el = $("ttsStatus");
  if (!el) return;
  el.textContent = text;
  el.className = "tstat " + (cls || "");
}

// 문장 분할기가 호출 → 모드에 따라 라우팅
function enqueueTts(sentence) {
  const mode = ttsMode();
  if (mode === "off") return;
  const clean = cleanForTts(sentence);
  if (!clean) return;
  if (mode === "server" && serverTtsAvailable) {
    serverTtsQueue.push(clean);
    drainServerTts();
  } else {
    browserQueue.push(clean);
    drainBrowserTts();
  }
}

// ===== 서버 TTS (AudioContext) =====
let audioCtx = null, analyser = null, lipData = null;
let serverPumpRunning = false;
let curSource = null;

function ensureAudioCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;                 // 256~512: 입싱크 RMS용
    analyser.smoothingTimeConstant = 0.6;
    analyser.connect(audioCtx.destination); // source → analyser → 스피커
    lipData = new Uint8Array(analyser.fftSize);
  }
  // 자동재생 정책: 사용자 제스처(전송 클릭) 안에서 resume 해야 함
  if (audioCtx.state === "suspended") audioCtx.resume();
}

async function fetchSentenceAudio(text) {
  const rate = parseFloat($("rate").value) || 1.0;
  const voice = ($("serverVoice").value || "").trim();
  let url = ttsServerBase() + "/tts?text=" + encodeURIComponent(text) + "&rate=" + rate;
  if (voice) url += "&voice=" + encodeURIComponent(voice);   // say 백엔드 음성 선택(melo 는 무시)
  const r = await fetch(url);
  if (!r.ok) throw new Error("TTS HTTP " + r.status);
  const arr = await r.arrayBuffer();
  return await audioCtx.decodeAudioData(arr);   // WAV(PCM)만 디코드 가능
}

function playBuffer(buf) {
  return new Promise((resolve) => {
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(analyser);
    curSource = src;
    serverPlaying = true;
    src.onended = () => {
      if (curSource === src) { curSource = null; serverPlaying = false; }
      resolve();
    };
    src.start();
  });
}

async function drainServerTts() {
  if (serverPumpRunning) return;
  serverPumpRunning = true;
  const myGen = ttsGen;
  try { ensureAudioCtx(); }
  catch (e) { serverPumpRunning = false; return fallbackServerToBrowser(e); }

  let pending = null;   // 다음 문장 prefetch promise
  try {
    while ((serverTtsQueue.length > 0 || pending) && myGen === ttsGen) {
      // 현재 재생할 버퍼(앞서 prefetch 했으면 그걸 사용)
      const buf = pending ? await pending : await fetchSentenceAudio(serverTtsQueue.shift());
      pending = null;
      if (myGen !== ttsGen) break;                       // 중간에 stop 됨
      // 재생 시작 직전에 다음 문장 prefetch(재생 ∥ fetch 로 공백 최소화)
      if (serverTtsQueue.length > 0) pending = fetchSentenceAudio(serverTtsQueue.shift());
      setSpeaking(true);
      await playBuffer(buf);                             // 재생은 반드시 큐 순서
    }
  } catch (e) {
    fallbackServerToBrowser(e);
  } finally {
    serverPumpRunning = false;
    serverPlaying = false;
    if (browserQueue.length === 0 && !browserPlaying) setSpeaking(false);
  }
}

// 서버 오류 → 남은 큐를 브라우저 내장으로 넘기고 폴백
function fallbackServerToBrowser(err) {
  serverTtsAvailable = false;
  setTtsStatus("서버 TTS 실패 → 브라우저 내장 폴백", "err");
  const rest = serverTtsQueue.splice(0);
  if (ttsMode() !== "off") for (const s of rest) browserQueue.push(s);
  drainBrowserTts();
}

// ===== 브라우저 내장 TTS (폴백) =====
function drainBrowserTts() {
  if (browserPlaying || browserQueue.length === 0 || !synth) return;
  if (ttsMode() === "off") { browserQueue = []; return; }
  const text = browserQueue.shift();
  const u = new SpeechSynthesisUtterance(text);
  const v = getSelectedVoice();
  if (v) { u.voice = v; u.lang = v.lang; } else { u.lang = "ko-KR"; }
  u.rate = parseFloat($("rate").value) || 1.0;
  u.pitch = parseFloat($("pitch").value) || 1.0;
  browserPlaying = true;
  setSpeaking(true);
  u.onend = u.onerror = () => {
    browserPlaying = false;
    if (browserQueue.length > 0) drainBrowserTts();
    else if (!serverPlaying) setSpeaking(false);
  };
  synth.speak(u);
}

// ===== 정지(새 전송/컨텍스트 초기화) =====
function stopTts() {
  ttsGen++;                                  // 진행 중 서버 펌프 무효화
  serverTtsQueue = [];
  if (curSource) { try { curSource.stop(); } catch (_) {} curSource = null; }
  serverPlaying = false;
  browserQueue = [];
  browserPlaying = false;
  if (synth) synth.cancel();
  setSpeaking(false);
}

// ===== /health 핑(상태 표시 + 가용성 갱신) =====
async function pingTts() {
  if (ttsMode() !== "server") { setTtsStatus(ttsMode() === "off" ? "TTS 꺼짐" : "브라우저 내장 사용", ""); return; }
  setTtsStatus("서버 확인 중...", "");
  try {
    const r = await fetch(ttsServerBase() + "/health", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    serverTtsAvailable = true;
    setTtsStatus("서버 연결됨 · " + (j.backend || "say"), "ok");
    loadServerVoices(j.backend);
  } catch (e) {
    serverTtsAvailable = false;
    setTtsStatus("서버 없음 → 폴백 사용", "err");
  }
}

// 서버 음성 목록 채우기.
//  - say  : 설치된 시스템 음성(Yuna 등)
//  - melo : voice/ 폴더의 캐릭터 음성(OpenVoice 음색 변환) + '변환 없음'
//  - qwen : 음성 1종이라 드롭다운 숨김
async function loadServerVoices(backend) {
  const sel = $("serverVoice");
  const row = sel.closest(".row");
  if (backend === "qwen") { if (row) row.style.display = "none"; return; }
  try {
    const r = await fetch(ttsServerBase() + "/voices", { cache: "no-store" });
    const list = (await r.json()).voices || [];
    const ko = list.filter((v) => (v.lang || "").startsWith("ko"));
    const voices = ko.length ? ko : list;
    const prev = $("serverVoice").value || localStorage.getItem("dllama_server_voice") || "";
    sel.innerHTML = "";
    if (backend === "melo") {           // 빈 값 = 변환 없이 melo 원본(또는 서버 기본)
      const o = document.createElement("option");
      o.value = ""; o.textContent = "기본(변환 없음)";
      sel.appendChild(o);
    }
    voices.forEach((v) => {
      const o = document.createElement("option");
      o.value = v.name;
      o.textContent = backend === "melo" ? v.name : v.name + " (" + v.lang + ")";
      sel.appendChild(o);
    });
    if (prev && voices.some((v) => v.name === prev)) sel.value = prev;
    if (row) row.style.display = (voices.length || backend === "melo") ? "" : "none";
  } catch (e) { if (row) row.style.display = "none"; }
}

// 스트리밍 텍스트를 문장 단위로 잘라 TTS 큐에 넣는다 → 추론과 동시에 말함.
// 신경망 TTS(qwen/melo)는 토막 텍스트에서 억양이 망가짐 → 문장 경계로 자르되
// 누적 길이가 MIN_TTS_CHARS 미만이면 다음 문장과 묶어서 한 번에 합성한다.
const MIN_TTS_CHARS = 30;
function makeSentenceSplitter() {
  let buf = "";        // 아직 문장 경계가 안 온 미완성 꼬리
  let pend = "";       // 경계는 지났지만 길이가 짧아 더 묶는 중인 조각
  let first = true;    // 첫 조각은 길이 조건 없이 즉시 발화 → 시작 지연 최소화
  const boundary = /[.!?。！？\n]/;
  return {
    push(delta) {
      buf += delta;
      let m;
      while ((m = boundary.exec(buf))) {
        const idx = m.index;
        pend += buf.slice(0, idx + 1);
        buf = buf.slice(idx + 1);
        if (first || pend.trim().length >= MIN_TTS_CHARS) {
          if (pend.trim()) { enqueueTts(pend); pend = ""; first = false; }
        }
      }
    },
    flush() {
      const tail = (pend + buf).trim();
      if (tail) enqueueTts(tail);
      pend = ""; buf = "";
    }
  };
}

/* =========================================================
   전송 / 스트리밍
   ========================================================= */
// 페르소나(시스템 프롬프트)를 맨 앞에 붙여 LLM에 보낼 메시지 구성.
// 시스템 메시지는 화면 history 에는 저장하지 않고 요청 때만 앞에 붙인다.
function buildMessages() {
  const persona = $("persona").value.trim();
  return persona ? [{ role: "system", content: persona }, ...history] : history.slice();
}

async function send() {
  if (streaming) return;
  const text = $("input").value.trim();
  if (!text) return;
  saveSettings();
  stopTts();
  // 자동재생 정책: 전송(사용자 제스처) 안에서 AudioContext 깨우기
  if (ttsMode() === "server") { try { ensureAudioCtx(); } catch (_) {} }

  $("input").value = "";
  $("input").style.height = "auto";
  addMsg("user", text);
  history.push({ role: "user", content: text });
  updateCtxBar();

  const out = addMsg("assistant", "");
  out.innerHTML = '<span class="cursor">▋</span>';
  streaming = true;
  $("sendBtn").disabled = true;

  const splitter = makeSentenceSplitter();
  const t0 = performance.now();
  let tokens = 0;
  let full = "";

  try {
    const resp = await fetch($("baseUrl").value.trim() + "/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "distributed-llama",
        messages: buildMessages(),
        temperature: parseFloat($("temp").value) || 0.7,
        stream: true
      })
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        const s = line.trim();
        if (!s.startsWith("data:")) continue;
        const data = s.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const j = JSON.parse(data);
          const delta = j?.choices?.[0]?.delta?.content || "";
          if (delta) {
            full += delta;
            tokens++;
            out.textContent = full;
            out.insertAdjacentHTML("beforeend", '<span class="cursor">▋</span>');
            chatEl.scrollTop = chatEl.scrollHeight;
            splitter.push(delta); // 문장 완성되는 대로 음성 재생
          }
        } catch (_) { /* keep-alive 등 무시 */ }
      }
    }
    splitter.flush();
    out.textContent = full;
    history.push({ role: "assistant", content: full });
    const ctx = updateCtxBar();
    if (ctx.pct >= 90)
      showToast("⚠️ 컨텍스트가 거의 찼습니다. '컨텍스트 초기화'를 누르세요.");

    const secs = (performance.now() - t0) / 1000;
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `${tokens} 토큰 · ${secs.toFixed(1)}s · ${(tokens / secs).toFixed(2)} tok/s`;
    out.parentElement.appendChild(meta);
  } catch (e) {
    out.textContent = full + "\n\n⚠️ 오류: " + e.message;
    setStatus("요청 실패: " + e.message, "err");
  } finally {
    streaming = false;
    $("sendBtn").disabled = false;
    $("input").focus();
  }
}

// ===== 이벤트 =====
$("sendBtn").onclick = send;
$("checkBtn").onclick = checkConnection;
$("clearBtn").onclick = () => {
  history = [];
  messagesEl.innerHTML = "";
  stopTts();
  updateCtxBar();
  showToast("🗑 컨텍스트를 초기화했습니다. 다음 메시지부터 서버 KV 캐시도 0부터 시작합니다.");
  $("input").focus();
};
$("seqLen").addEventListener("input", () => { saveSettings(); updateCtxBar(); });
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
$("input").addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 160) + "px";
});

$("ttsMode").addEventListener("change", () => {
  localStorage.setItem("dllama_tts_mode", $("ttsMode").value);
  if (ttsMode() === "off") stopTts();
  pingTts();
});
$("ttsServer").addEventListener("change", () => {
  localStorage.setItem("dllama_tts_server", $("ttsServer").value.trim());
  serverTtsAvailable = true;   // 새 주소이므로 재시도 허용
  pingTts();
});
$("persona").addEventListener("change", () => { localStorage.setItem("dllama_persona2", $("persona").value); updateCtxBar(); });
$("serverVoice").addEventListener("change", () => localStorage.setItem("dllama_server_voice", $("serverVoice").value));
$("voiceSel").addEventListener("change", () => localStorage.setItem("dllama_voice", $("voiceSel").value));
$("rate").addEventListener("input", () => $("rateVal").textContent = $("rate").value);
$("pitch").addEventListener("input", () => $("pitchVal").textContent = $("pitch").value);

// ===== 시작 =====
checkConnection();
pingTts();
updateCtxBar();
$("input").focus();
</script>
</body>
